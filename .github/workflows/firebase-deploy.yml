name: Deploy Firebase App and MCP Functions

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            pti-app/package-lock.json
            functions/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd pti-app
          npm install

      - name: Build Angular App
        run: |
          cd pti-app
          npm run build -- --configuration production

      - name: Install Functions Dependencies
        run: npm install --prefix functions

      - name: Build Functions
        run: npm run build --prefix functions

      - name: Configure Functions Runtime Environment
        if: ${{ secrets.PTI_MCP_API_KEYS != '' }}
        run: |
          printf 'PTI_MCP_API_KEYS=%s\n' "${{ secrets.PTI_MCP_API_KEYS }}" > functions/.env

      - name: Deploy Firebase Hosting and Functions
        if: ${{ secrets.FIREBASE_SERVICE_ACCOUNT != '' }}
        env:
          FIREBASE_PROJECT_ID: pti-app-2ab59
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json
        run: |
          set -euo pipefail
          printf '%s' "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" > "$GOOGLE_APPLICATION_CREDENTIALS"
          npm install -g firebase-tools
          firebase --version
          firebase deploy --project "$FIREBASE_PROJECT_ID" --only hosting,functions --non-interactive
