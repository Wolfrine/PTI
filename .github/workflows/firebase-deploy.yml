name: Deploy Firebase App and MCP Functions

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            pti-app/package-lock.json
            functions/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd pti-app
          npm install

      - name: Build Angular App
        run: |
          cd pti-app
          npm run build -- --configuration production

      - name: Install Functions Dependencies
        run: npm install --prefix functions

      - name: Build Functions
        run: npm run build --prefix functions

      - name: Configure Functions Runtime Environment
        env:
          PTI_MCP_API_KEYS_VALUE: ${{ secrets.PTI_MCP_API_KEYS }}
        run: |
          if [ -n "$PTI_MCP_API_KEYS_VALUE" ]; then
            printf 'PTI_MCP_API_KEYS=%s\n' "$PTI_MCP_API_KEYS_VALUE" > functions/.env
          else
            echo "PTI_MCP_API_KEYS is not configured; MCP will deploy but reject authenticated calls until the secret is added."
          fi

      - name: Deploy Firebase Hosting
        env:
          FIREBASE_PROJECT_ID: pti-app-2ab59
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          set -euo pipefail
          if [ -z "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            echo "FIREBASE_SERVICE_ACCOUNT is not configured; skipping Firebase deploy."
            exit 0
          fi
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$GOOGLE_APPLICATION_CREDENTIALS"
          npm install -g firebase-tools
          firebase --version
          firebase deploy --project "$FIREBASE_PROJECT_ID" --only hosting --non-interactive

      - name: Deploy Firebase Functions MCP
        continue-on-error: true
        env:
          FIREBASE_PROJECT_ID: pti-app-2ab59
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          set -euo pipefail
          if [ -z "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            echo "FIREBASE_SERVICE_ACCOUNT is not configured; skipping Firebase Functions deploy."
            exit 0
          fi
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$GOOGLE_APPLICATION_CREDENTIALS"
          firebase deploy --project "$FIREBASE_PROJECT_ID" --only functions --non-interactive
