<main class="home-shell">
  <section class="home-hero">
    <div class="home-copy">
      <p class="eyebrow">PTI Prime Access</p>
      <h1>Choose command mode</h1>
      <p>
        Executive portfolio control or focused PTI operations, each tuned for fast decisions on mobile.
      </p>
    </div>

    <section class="home-grid" aria-label="Dashboard launch tiles">
      <button
        class="home-tile"
        *ngFor="let tile of premiumTiles"
        [attr.data-tile]="tile.id"
        type="button"
        (click)="open(tile.path)"
      >
        <span class="tile-icon">
          <mat-icon>{{ tile.id === 'codex-command' ? 'space_dashboard' : 'analytics' }}</mat-icon>
        </span>
        <span class="tile-kicker">{{ tile.id === 'codex-command' ? 'Executive scan' : 'Operations desk' }}</span>
        <h2>{{ tile.label }}</h2>
        <p>{{ tile.description }}</p>
        <span class="tile-action">
          Open surface
          <mat-icon>arrow_forward</mat-icon>
        </span>
      </button>
    </section>
  </section>
</main>
